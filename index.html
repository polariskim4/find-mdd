<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>한국 주식 재무 정보 조회</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="container">
    <h1>한국 주식 재무 정보 조회</h1>
    <p>서버를 실행하고 <strong>http://localhost:3000</strong>에서 열어주세요. 코스피 또는 코스닥 종목명을 한글로 입력하면 기본 재무 지표와 월봉 차트를 조회합니다.</p>

    <form id="search-form">
      <label for="stock-name">종목명</label>
      <input id="stock-name" type="text" placeholder="예: 삼성전자" autocomplete="off" />
      <button type="submit">조회</button>
    </form>

    <section id="result" class="result hidden">
      <h2>조회 결과</h2>
      <div class="summary">
        <div><strong>종목명</strong> <span id="result-name"></span></div>
        <div><strong>시가총액</strong> <span id="result-marketcap"></span></div>
        <div><strong>네이버증권</strong> <a id="result-naver-link" href="#" target="_blank" rel="noopener noreferrer">바로가기</a></div>
      </div>
      <table>
        <tbody>
          <tr><th>매출액</th><td id="result-revenue"></td></tr>
          <tr><th>영업이익</th><td id="result-operating-profit"></td></tr>
          <tr><th>PER</th><td id="result-per"></td></tr>
          <tr><th>PBR</th><td id="result-pbr"></td></tr>
          <tr><th>영업이익률</th><td id="result-operating-margin"></td></tr>
          <tr><th>매출성장률</th><td id="result-revenue-growth"></td></tr>
          <tr><th>이익성장률</th><td id="result-profit-growth"></td></tr>
        </tbody>
      </table>

      <div class="chart-box">
        <h3>네이버증권 월봉</h3>
        <div id="chart-container"><img id="monthly-chart-img" alt="네이버 월봉 차트" /></div>
      </div>
    </section>

    <section id="benchmark" class="benchmark hidden">
      <h2>벤치마크 종목</h2>
      <p id="benchmark-message" class="message"></p>
      <div class="benchmark-scroll">
        <table id="benchmark-table">
          <thead>
            <tr>
              <th>종목</th>
              <th>시가총액</th>
              <th>매출액</th>
              <th>영업이익</th>
              <th>PER</th>
              <th>PBR</th>
              <th>마진</th>
              <th>매출성장률</th>
              <th>이익성장률</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </section>

    <p id="message" class="message"></p>
  </main>
  <script src="script.js"></script>
</body>
</html>
